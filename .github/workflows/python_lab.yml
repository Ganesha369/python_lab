on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Requests
        run: pip install requests
      - name: Run Script
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, re, subprocess, random, time
          from datetime import datetime

          # 1. SETUP
          user = 'Ganesha369'
          email = 'ganesha.am.369@gmail.com'
          topics = ['API Rate Limiter (Sliding Window)', 'Log Parser (String Search)', 'Priority Support Queue (Heaps)', 'LRU Cache Manager']
          selected = random.choice(topics)
          
          # 2. PROMPT
          prompt = f'Build an SDE-1 Python project for: {selected}. Use Streamlit. Explain the DSA logic simply. Return: [NAME]slug[/NAME] [DESC]desc[/DESC] [CODE]code[/CODE] [README]md[/README] [REQS]libs[/REQS]'
          
          try:
              # 3. CALL AI
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              resp.raise_for_status()
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']
              
              name = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-')
              repo_name = f'dsa-{name}-{random.randint(10,99)}'
              desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
              code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              # 4. CREATE REPO
              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': desc}, headers=headers).raise_for_status()
              
              print('Waiting 20s for GitHub...')
              time.sleep(20)

              # 5. LOCAL PUSH
              os.makedirs(repo_name, exist_ok=True); os.chdir(repo_name)
              with open('main.py', 'w') as f: f.write(code)
              with open('README.md', 'w') as f: f.write(readme)
              with open('requirements.txt', 'w') as f: f.write(reqs)
              
              subprocess.run(['git', 'init', '-b', 'main'])
              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', email])
              
              remote = f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{repo_name}.git'
              subprocess.run(['git', 'remote', 'add', 'origin', remote])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', 'Init'])
              
              # Push attempt
              subprocess.run(['git', 'push', '-u', 'origin', 'main'])

              # 6. UPDATE PROFILE
              os.chdir('..')
              subprocess.run(['git', 'clone', f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{user}.git', 'bio'])
              os.chdir('bio')
              new_row = f'| {datetime.now().strftime(\"%b %d\")} | [{repo_name}](https://github.com/{user}/{repo_name}) | {desc} |'
