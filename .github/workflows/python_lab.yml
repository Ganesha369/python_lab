name: Lab Module Provisioner
on:
  schedule:
    - cron: '0 3,16 * * *'
    - cron: '15 7 * * *'
    - cron: '15 20 * * *' # Scheduled run
  workflow_dispatch: 

jobs:
  update-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Current Workspace
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Engineering Module
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, os, requests, re, time
          from datetime import datetime, timedelta

          ist_time = datetime.utcnow() + timedelta(hours=5, minutes=30)
          prompt = 'Act as a Senior Python Developer. Create a specialized coding module for a specific industry. Provide clean code and a professional README. FORMAT: ---CODE--- (code) ---README--- (description)'
          
          def call_gemini():
              api_key = os.getenv('API_KEY')
              # USING THE MOST STABLE 2026 WORKHORSE MODEL
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}'
              
              for attempt in range(5): # INCREASED TO 5 ATTEMPTS
                  try:
                      resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]}, timeout=60)
                      if resp.status_code == 200:
                          return resp.json()
                      elif resp.status_code == 503:
                          print(f'Server busy (503). Attempt {attempt+1}/5. Retrying in 30s...')
                          time.sleep(30) # LONGER WAIT TIME
                      else:
                          print(f'API Error {resp.status_code}: {resp.text}')
                          break
                  except Exception as e:
                      print(f'Connection issue: {e}')
                      time.sleep(10)
              return None

          try:
              data = call_gemini()
              if not data or 'candidates' not in data:
                  exit(1)

              text = data['candidates'][0]['content']['parts'][0]['text']
              code_match = re.search(r'---CODE---(.*?)---README---', text, re.DOTALL)
              readme_match = re.search(r'---README---(.*)', text, re.DOTALL)

              if code_match and readme_match:
                  folder = 'module_' + ist_time.strftime('%Y%m%d_%H%M')
                  os.makedirs(folder, exist_ok=True)
                  clean_code = code_match.group(1).strip().replace('\\\python', '').replace('\\\', '')
                  with open(f'{folder}/main.py', 'w') as f: f.write(clean_code)
                  with open(f'{folder}/README.md', 'w') as f: f.write(readme_match.group(1).strip())
                  print(f'Successfully created {folder}')
              else:
                  print('AI output format error.')
          except Exception as e:
              print(f'Critical Error: {e}')
              exit(1)
          "

      - name: Deploy Changes
        run: |
          git config --local user.email \"action@github.com\"
          git config --local user.name \"github-actions[bot]\"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo \"No changes to commit\"
          else
            git commit -m \"docs: update laboratory modules\"
            git push
          fi
