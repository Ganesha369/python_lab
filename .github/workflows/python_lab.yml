[10-03-2026 02:02] Ganesha💲: name: Portfolio Architect
on:
  schedule:
    - cron: '30 2 * * *'  # ~8:00 AM IST
    - cron: '0 6 * * *'   # ~11:30 AM IST
    - cron: '15 10 * * *' # ~3:45 PM IST
    - cron: '45 14 * * *' # ~8:15 PM IST
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Professional Generator
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import json, os, requests, re, time, random, subprocess
          from datetime import datetime
          
          time.sleep(random.randint(0, 600))

          topics = ['Fintech Asset Tracker', 'HealthTech Portal', 'Cybersecurity Scanner', 'AI Logistics', 'SaaS Middleware']
          selected_topic = random.choice(topics)
          
          full_prompt = f'Act as a Senior Architect. Design a Python project for: {selected_topic}. Provide: [NAME]slug-name[/NAME] [DESC]one-sentence-desc[/DESC] [CODE]code[/CODE] [README]readme[/README] [REQS]libs[/REQS]'

          try:
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': full_prompt}]}]})
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              repo_name = re.search(r'\[NAME\](.*?)\[/NAME\]', text).group(1).strip().lower().replace(' ', '-')
              repo_desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text).group(1).strip()
              code_body = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme_body = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs_list = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              license_text = f'MIT License\n\nCopyright (c) {datetime.now().year} Ganesha\n\nPermission is hereby granted...'

              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              repo_data = {'name': repo_name, 'description': repo_desc, 'private': False}
              create_resp = requests.post('https://api.github.com/user/repos', json=repo_data, headers=headers)
              
              if create_resp.status_code == 201:
                  clone_url = create_resp.json()['clone_url'].replace('https://', f'https://{os.getenv(\"GH_TOKEN\")}@')
                  os.makedirs(repo_name, exist_ok=True)
                  os.chdir(repo_name)
                  
                  # Initialize Git
                  subprocess.run(['git', 'init', '-b', 'main'])
                  
                  # Create Files - FIXED SYNTAX HERE
                  with open('main.py', 'w') as f:
                      f.write(code_body)
                  with open('README.md', 'w') as f:
                      f.write(readme_body)
                  with open('requirements.txt', 'w') as f:
                      f.write(reqs_list)
                  with open('LICENSE', 'w') as f:
                      f.write(license_text)
                  
                  # Set Identity
                  subprocess.run(['git', 'config', '--global', 'user.name', os.getenv(\"MY_NAME\")])
                  subprocess.run(['git', 'config', '--global', 'user.email', os.getenv(\"MY_EMAIL\")])
                  
                  # Push to GitHub
                  subprocess.run(['git', 'remote', 'add', 'origin', clone_url])
[10-03-2026 02:02] Ganesha💲: subprocess.run(['git', 'add', '.'])
                  subprocess.run(['git', 'commit', '-m', 'Initial architecture and implementation'])
                  subprocess.run(['git', 'push', '-u', 'origin', 'main'])
                  
                  print(f'Successfully created {repo_name}')
              else:
                  print('API Error:', create_resp.text)
          except Exception as e:
              print('Error:', e)
          "
