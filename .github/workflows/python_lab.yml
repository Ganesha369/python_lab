on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '0 6 * * *'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Professional Generator
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import json, os, requests, re, time, random, subprocess
          from datetime import datetime
          
          # 1. Generate a Unique Name using a timestamp
          timestamp = datetime.now().strftime('%Y%m%d-%H%M')
          topics = ['Fintech Asset Tracker', 'HealthTech Portal', 'Cybersecurity Scanner', 'AI Logistics', 'SaaS Middleware']
          selected_topic = random.choice(topics)
          
          full_prompt = f'Act as a Senior Architect. Design a unique Python project for: {selected_topic}. Provide: [NAME]slug-name[/NAME] [DESC]one-sentence-desc[/DESC] [CODE]code[/CODE] [README]readme[/README] [REQS]libs[/REQS]'

          try:
              # 2. Get AI Content
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': full_prompt}]}]})
              resp.raise_for_status()
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              raw_name = re.search(r'\[NAME\](.*?)\[/NAME\]', text).group(1).strip().lower().replace(' ', '-')
              # Add timestamp to ensure uniqueness
              repo_name = f'{raw_name}-{timestamp}'
              
              repo_desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text).group(1).strip()
              code_body = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme_body = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs_list = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              # 3. Create the Repository via GitHub API
              headers = {
                  'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 
                  'Accept': 'application/vnd.github.v3+json'
              }
              repo_data = {'name': repo_name, 'description': repo_desc, 'private': False}
              create_resp = requests.post('https://api.github.com/user/repos', json=repo_data, headers=headers)
              
              if create_resp.status_code == 201:
                  print(f'Successfully created repository: {repo_name}')
                  clone_url = f'https://{os.getenv(\"GH_TOKEN\")}@github.com/{os.getenv(\"MY_NAME\")}/{repo_name}.git'
                  
                  # 4. Push Files to the New Repo
                  os.makedirs(repo_name, exist_ok=True)
                  os.chdir(repo_name)
                  subprocess.run(['git', 'init', '-b', 'main'])
                  with open('main.py', 'w') as f: f.write(code_body)
                  with open('README.md', 'w') as f: f.write(readme_body)
                  with open('requirements.txt', 'w') as f: f.write(reqs_list)
                  
                  subprocess.run(['git', 'config', '--global', 'user.name', os.getenv(\"MY_NAME\")])
                  subprocess.run(['git', 'config', '--global', 'user.email', os.getenv(\"MY_EMAIL\")])
                  subprocess.run(['git', 'remote', 'add', 'origin', clone_url])
                  subprocess.run(['git', 'add', '.'])
                  subprocess.run(['git', 'commit', '-m', 'Initial architecture'])
