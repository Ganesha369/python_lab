name: SDE_University_Mentor_Edition
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Architect Curriculum"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re

          def run():
              # FORCE RUN: Random line removed for this first setup
              user = 'Ganesha369'
              
              # 🎓 The Master Curriculum (Simplified Paths for better folder creation)
              curriculum = [
                  '01-Foundations-Syntax-and-Output',
                  '02-Foundations-Variables-and-Types',
                  '03-Milestone-Project-Interactive-Story', 
                  '04-Control-Flow-If-Else-Logic',
                  '05-Control-Flow-Loops-Deep-Dive',
                  '06-Milestone-Project-Guessing-Game'
              ]

              # Find the next topic
              next_topic = None
              for topic in curriculum:
                  if not os.path.exists(topic):
                      next_topic = topic
                      break
              
              if not next_topic:
                  print('Curriculum Complete or no new topics found.')
                  return

              print(f'Starting build for: {next_topic}')

              # 🧠 SDE-2 Prompt
              prompt = f'''Act as a Microsoft SDE-2 teaching a beginner. Topic: {next_topic}.
              If Milestone: Build a project. If not: Teach Level 0-4.
              YOU MUST INCLUDE PYTHON CODE SNIPPETS IN EVERY SECTION.
              [TITLE]Project Name[/TITLE]
              [LESSON]Full tutorial with Level 0 to Level 4 sections and code snippets[/LESSON]
              [CODE]One single runnable python script[/CODE]'''

              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              
              data = resp.json()
              if 'candidates' not in data:
                  print('AI Error:', data)
                  return
              text = data['candidates'][0]['content']['parts'][0]['text']

              def get_tag(tag):
                  match = re.search(f'\\[{tag}\\](.*?)\\[/{tag}\\]', text, re.DOTALL)
                  return match.group(1).strip() if match else 'Content coming soon...'

              t_title = get_tag('TITLE')
              t_lesson = get_tag('LESSON')
              t_code = get_tag('CODE')

              # Create folder and files
              os.makedirs(next_topic, exist_ok=True)
              
              with open(f'{next_topic}/main.py', 'w') as f: f.write(t_code)
              with open(f'{next_topic}/LEARN.md', 'w') as f: 
                  f.write(f'# {t_title}\n\n{t_lesson}')

              # 📚 Generate Table of Contents
              toc = '# 🎓 The SDE-1 Zero-to-Hero University\n\n'
              for topic in curriculum:
                  if os.path.exists(topic):
                      display = topic.replace('-', ' ')
                      toc += f'- [{display}](./{topic}/LEARN.md)\n'

              with open('README.md', 'w') as f: f.write(toc)

              # Git Push
              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', f'Update: {next_topic}'])
              subprocess.run(['git', 'push'])
          run()
          "
