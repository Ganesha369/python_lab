name: Portfolio Architect
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Script
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha369"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import json, os, requests, re, datetime, subprocess, random
          
          # Generate unique name
          suffix = datetime.datetime.now().strftime('%m%d%H%M')
          topic = random.choice(['Fintech', 'HealthTech', 'AI-Logistics'])
          prompt = f'Provide: [NAME]app-{suffix}[/NAME] [DESC]A {topic} tool[/DESC] [CODE]print(\"hello\")[/CODE] [README]info[/README] [REQS]requests[/REQS]'

          try:
              # 1. Get AI Content
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              data = resp.json()
              text = data['candidates'][0]['content']['parts'][0]['text']

              repo_name = re.search(r'\[NAME\](.*?)\[/NAME\]', text).group(1).strip()
              repo_desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text).group(1).strip()
              code_body = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()

              # 2. Create Repo
              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              create_resp = requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': repo_desc}, headers=headers)
              
              if create_resp.status_code == 201:
                  print(f'CREATED: {repo_name}')
                  # Git commands...
                  clone_url = f'https://{os.getenv(\"GH_TOKEN\")}@github.com/{os.getenv(\"MY_NAME\")}/{repo_name}.git'
                  os.makedirs(repo_name, exist_ok=True)
                  os.chdir(repo_name)
                  subprocess.run(['git', 'init', '-b', 'main'])
                  with open('main.py', 'w') as f: f.write(code_body)
                  subprocess.run(['git', 'config', '--global', 'user.name', 'Ganesha369'])
                  subprocess.run(['git', 'config', '--global', 'user.email', os.getenv(\"MY_EMAIL\")])
                  subprocess.run(['git', 'remote', 'add', 'origin', clone_url])
                  subprocess.run(['git', 'add', '.'])
                  subprocess.run(['git', 'commit', '-m', 'init'])
                  subprocess.run(['git', 'push', '-u', 'origin', 'main'])
              else:
                  print(f'API Error: {create_resp.text}')
                  exit(1)
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
