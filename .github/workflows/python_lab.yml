name: Lab Module Provisioner
on:
  schedule:
    # Triggering at 8:30am, 12:45pm, 4:39pm, 6:47pm, 9:30pm (IST)
    - cron: '0 3,16 * * *'    # 8:30 AM & 9:30 PM IST
    - cron: '15 7 * * *'      # 12:45 PM IST
    - cron: '9 11 * * *'      # 4:39 PM IST
    - cron: '17 13 * * *'     # 6:47 PM IST
  workflow_dispatch: 

jobs:
  update-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Current Workspace
        uses: actions/checkout@v4
      
      - name: Generate Engineering Module
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, os, requests, re
          from datetime import datetime

          # Professional prompt for industry-specific Python applications
          prompt = 'Act as a Senior Python Developer. Create a specialized coding module for a specific industry. Provide clean code and a professional README including Tech Stack and Business Value. FORMAT: ---CODE--- (code) ---README--- (description)'
          
          url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={os.getenv(\"API_KEY\")}'
          resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
          data = resp.json()
          
          text = data['candidates'][0]['content']['parts'][0]['text']
          code = re.search(r'---CODE---(.*?)---README---', text, re.DOTALL)
          readme = re.search(r'---README---(.*)', text, re.DOTALL)

          if code and readme:
              folder = 'module_' + datetime.now().strftime('%Y%m%d_%H%M')
              os.makedirs(folder, exist_ok=True)
              with open(f'{folder}/main.py', 'w') as f: f.write(code.group(1).strip().strip('`python').strip('```'))
              with open(f'{folder}/README.md', 'w') as f: f.write(readme.group(1).strip())
          "

      - name: Deploy Changes
        run: |
          git config --local user.email "provisioner-bot@github.com"
          git config --local user.name "System Provisioner"
          if [ -n \"$(git status --porcelain)\" ]; then
            git add .
            git commit -m "docs: update laboratory modules and technical documentation"
            git push
          else
            echo "No changes detected."
          fi
