name: SDE_University_Ultimate_Edition
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Architect Knowledge & Backend Systems"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random
          from datetime import datetime

          def run():
              if random.random() > 0.20: return

              user = 'Ganesha369'
              roadmap = ['01-Python-Syntax', '02-Loops-Logic', '03-Lists-Tuples', '04-Dictionaries-JSON', '05-Functions-APIs', '06-Arrays-Hashing', '07-FastAPI-Backends', '10-Linked-Lists', '12-Trees-Graphs']

              existing = [f for f in os.listdir('.') if os.path.isdir(f)]
              current_module = next((s for s in roadmap if not any(s in f for f in existing)), roadmap[-1])

              for level in range(1, 5):
                  # The prompt now FORCES explanation of JSON, FastAPI, and API logic
                  prompt = f'''Act as a Senior SDE. Build Level-{level} for {current_module}.
                  If Level > 2, you MUST integrate and explain:
                  - JSON: How data is structured.
                  - FastAPI/APIs: How the backend communicates.
                  - RE-USE: How this mixes with previous concepts.
                  Return: [NAME]name[/NAME] [WHY]Real-World-Example[/WHY] [TECH]Stack-with-Backend-Details[/TECH] [GUIDE]Beginner-Deep-Dive[/GUIDE] [CODE]Python-Code[/CODE]'''
                  
                  url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
                  resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
                  text = resp.json()['candidates'][0]['content']['parts'][0]['text']

                  # Parsing
                  n = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().replace(' ', '-')
                  w = re.search(r'\[WHY\](.*?)\[/WHY\]', text, re.DOTALL).group(1).strip()
                  t = re.search(r'\[TECH\](.*?)\[/TECH\]', text, re.DOTALL).group(1).strip()
                  g = re.search(r'\[GUIDE\](.*?)\[/GUIDE\]', text, re.DOTALL).group(1).strip()
                  c = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()

                  path = f'{current_module}/{n}-Level-{level}'
                  os.makedirs(path, exist_ok=True)
                  live_link = f'https://ganesha-dsa-hub.streamlit.app/?path={path}/main.py'
                  
                  # 💡 Adding Request & Star buttons
                  request_url = f'https://github.com/{user}/python_lab/issues/new?title=Request:+New+Concept+Idea'

                  with open(f'{path}/main.py', 'w') as f: f.write(c)
                  with open(f'{path}/LEARN.md', 'w') as f: 
                      f.write(f'# {n} (Level {level})\n\n[🚀 RUN LIVE]({live_link}) | [💡 REQUEST TOPIC]({request_url})\n\n### 🏢 Real-World Use\n{w}\n\n### 🛠️ Backend & Tech Stack\n{t}\n\n### 📘 Step-by-Step Breakdown\n{g}')

              # Update TOC
              toc = '# 🐍 Python SDE-1 University\n\n## 🎓 Course Roadmap\n'
              for folder in sorted([f for f in os.listdir('.') if os.path.isdir(f) and not f.startswith('.')]):
                  toc += f'### 📁 {folder}\n'
                  for sub in sorted(os.listdir(folder)):
                      toc += f'- [Level {sub[-1]}: {sub.replace("-", " ")}](./{folder}/{sub}/LEARN.md)\n'
              with open('README.md', 'w') as f: f.write(toc)

              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', f'Module {current_module} Deployed'])
              subprocess.run(['git', 'push'])
          run()
          "
