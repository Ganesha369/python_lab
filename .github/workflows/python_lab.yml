name: DSA_SDE1_Final_Verification
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: "Install Dependencies"
        run: pip install requests

      - name: "Run Project Architect"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, subprocess, re, random, time
          from datetime import datetime

          def run():
              user = 'Ganesha369'
              # 1. AI Content Generation
              prompt = 'Build a professional Streamlit DSA project. Return: [NAME]name[/NAME] [DESC]desc[/DESC] [CODE]code[/CODE] [README]md[/README] [GUIDE]guide[/GUIDE]'
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              # 2. Parse Data
              name = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-')
              repo_name = f'dsa-{name}-{random.randint(10,99)}'
              code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()

              # 3. Create Repo via API
              h = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              requests.post('https://api.github.com/user/repos', json={'name': repo_name}, headers=h).raise_for_status()
              print(f'Created {repo_name}. Waiting for sync...')
              time.sleep(15)

              # 4. Git Operations - FORCING MAIN BRANCH
              os.makedirs('temp_repo', exist_ok=True); os.chdir('temp_repo')
              subprocess.run(['git', 'init', '-b', 'main'])
              
              # CREATE FILES
              with open('main.py', 'w') as f: f.write(code)
              with open('README.md', 'w') as f: f.write(readme)
              with open('requirements.txt', 'w') as f: f.write('streamlit')

              # CONFIGURE & PUSH
              subprocess.run(['git', 'config', 'user.name', user])
              subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
              auth_url = f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{repo_name}.git'
              subprocess.run(['git', 'remote', 'add', 'origin', auth_url])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', 'SDE-1 Release'])
              
              # Force push to 'main'
              result = subprocess.run(['git', 'push', '-u', 'origin', 'main', '--force'], capture_output=True, text=True)
              print(result.stdout)
              if result.returncode != 0:
                  print(f'PUSH FAILED: {result.stderr}')
                  exit(1)

              print('Successfully pushed to main branch!')
          run()
          "
