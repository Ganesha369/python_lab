name: DSA_SDE1_Architect
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Dependencies"
        run: pip install requests

      - name: "Run Project Architect"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, re, subprocess, random, time
          from datetime import datetime

          def run():
              try:
                  user = 'Ganesha369'
                  topics = ['LRU Cache System', 'API Rate Limiter', 'Bank Undo-Redo Stack', 'Inventory Hash-Map Search', 'Priority Task Heap']
                  selected = random.choice(topics)
                  
                  # 1. AI Generation
                  prompt = f'Build an SDE-1 Python project for {selected}. Use Streamlit. Use professional Classes and Type Hinting. README must explain Business Problem and Why this DSA is used in companies. Return: [NAME]name[/NAME] [DESC]desc[/DESC] [CODE]code[/CODE] [README]md[/README] [REQS]libs[/REQS]'
                  
                  # CHANGED: Using strictly gemini-3-flash
                  url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash:generateContent?key={os.getenv(\"API_KEY\")}'
                  resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
                  resp.raise_for_status()
                  text = resp.json()['candidates'][0]['content']['parts'][0]['text']

                  # 2. Extract Data
                  repo_name = 'dsa-' + re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-') + '-' + str(random.randint(10,99))
                  desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
                  code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
                  readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
                  reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

                  # 3. Create Remote Repo
                  h = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
                  requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': desc}, headers=h).raise_for_status()
                  print('Repo Created. Waiting for GitHub Sync...')
                  time.sleep(15) 

                  # 4. Push Files
                  os.makedirs(repo_name, exist_ok=True); os.chdir(repo_name)
                  with open('main.py', 'w') as f: f.write(code)
                  with open('README.md', 'w') as f: f.write(readme)
                  with open('requirements.txt', 'w') as f: f.write(reqs + '\nstreamlit')

                  subprocess.run(['git', 'init', '-b', 'main'])
                  subprocess.run(['git', 'config', 'user.name', user])
                  subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
                  
                  auth_url = f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{repo_name}.git'
                  subprocess.run(['git', 'remote', 'add', 'origin', auth_url])
                  subprocess.run(['git', 'add', '.'])
                  subprocess.run(['git', 'commit', '-m', 'SDE-1 Release'])
                  subprocess.run(['git', 'push', '-u', 'origin', 'main', '--force'])

                  # 5. Update Profile Gallery
                  os.chdir('..')
                  
                  # FIXED: Proper line breaks for these commands
                  subprocess.run(['git', 'clone', f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{user}.git', 'bio'])
                  os.chdir('bio')
                  
                  date_str = datetime.now().strftime('%b %d')
                  
                  # FIXED: Safely targeting a specific HTML comment marker instead of an empty string
                  new_row = f'| {date_str} | [{repo_name}](https://github.com/{user}/{repo_name}) | {desc} |\n'
                  
                  with open('README.md', 'r') as f: content = f.read()
                  
                  if '' in content:
                      updated_content = content.replace('', new_row)
                      with open('README.md', 'w') as f: f.write(updated_content)
                      subprocess.run(['git', 'add', 'README.md'])
                      subprocess.run(['git', 'commit', '-m', f'Add {repo_name} to gallery'])
                      subprocess.run(['git', 'push'])
                      print('Gallery updated successfully!')
                  else:
                      print('Marker not found in Profile README.')
              except Exception as e:
                  print(f'Critical Failure: {e}')
                  exit(1)

          run()
          "
