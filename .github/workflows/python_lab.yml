name: DSA_Architect_SDE1
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Requests"
        run: pip install requests

      - name: "Run Project Architect"
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 -c "
          import requests, os, re, subprocess, random, time
          from datetime import datetime

          def run_workflow():
              try:
                  user = 'Ganesha369'
                  topics = ['Log-Parser-Sliding-Window', 'API-Rate-Limiter', 'LRU-Cache-Manager', 'Priority-Support-Heap']
                  selected = random.choice(topics)
                  
                  # 1. AI API CALL
                  prompt = f'Build an SDE-1 Python project for {selected}. Use Streamlit. Explain logic simply. Return: [NAME]name[/NAME] [DESC]desc[/DESC] [CODE]code[/CODE] [README]md[/README] [REQS]libs[/REQS]'
                  url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
                  resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
                  resp.raise_for_status()
                  text = resp.json()['candidates'][0]['content']['parts'][0]['text']

                  # 2. PARSE DATA
                  repo_name = 'dsa-' + re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-') + '-' + str(random.randint(10,99))
                  desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
                  code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
                  readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
                  reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

                  # 3. CREATE REPO
                  h = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
                  requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': desc}, headers=h).raise_for_status()
                  
                  print('Waiting 20s for GitHub sync...'); time.sleep(20)

                  # 4. FILES & GIT
                  os.makedirs(repo_name, exist_ok=True); os.chdir(repo_name)
                  with open('main.py', 'w') as f: f.write(code)
                  with open('README.md', 'w') as f: f.write(readme)
                  with open('requirements.txt', 'w') as f: f.write(reqs)

                  subprocess.run(['git', 'init', '-b', 'main'])
                  subprocess.run(['git', 'config', 'user.name', user])
                  subprocess.run(['git', 'config', 'user.email', 'ganesha.am.369@gmail.com'])
                  
                  auth_url = f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{repo_name}.git'
                  subprocess.run(['git', 'remote', 'add', 'origin', auth_url])
                  subprocess.run(['git', 'add', '.'])
                  with open('README.md', 'r') as f: content = f.read()
                  if '' in content:
                      with open('README.md', 'w') as f: f.write(content.replace('', '\\n' + new_row))
                      subprocess.run(['git', 'add', '.'])
                      subprocess.run(['git', 'commit', '-m', 'Sync Gallery'])
                      subprocess.run(['git', 'push'])
              except Exception as e:
                  print(f'Error: {e}'); exit(1)

          run_workflow()
          "
                  subprocess.run(['git', 'commit', '-m', 'Initial Setup'])
                  subprocess.run(['git', 'push', '-u', 'origin', 'main', '--force'])

                  # 5. UPDATE BIO
                  os.chdir('..')
                  subprocess.run(['git', 'clone', f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/{user}/{user}.git', 'bio'])
                  os.chdir('bio')
                  new_row = f'| {datetime.now().strftime(\"%b %d\")} | [{repo_name}](https://github.com/{user}/{repo_name}) | {desc} |'
