name: Lab Module Provisioner
on:
  schedule:
    - cron: '0 3,16 * * *'
    - cron: '15 7 * * *'
    - cron: '9 11 * * *'
    - cron: '15 18 * * *'  # 11:45 PM IST (approx 3 minutes from now)
  workflow_dispatch: 

jobs:
  update-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Current Workspace
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Engineering Module
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import json, os, requests, re
          from datetime import datetime, timedelta

          ist_time = datetime.utcnow() + timedelta(hours=5, minutes=30)
          prompt = 'Act as a Senior Python Developer. Create a specialized coding module for a specific industry. Provide clean code and a professional README including Tech Stack and Business Value. FORMAT: ---CODE--- (code) ---README--- (description)'
          
          try:
              api_key = os.getenv('API_KEY')
              if not api_key:
                  raise ValueError('GEMINI_API_KEY is missing from GitHub Secrets')

              # UPDATED: Using the Gemini 3 Flash Preview Model
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={api_key}'
              
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              data = resp.json()
              
              if 'candidates' not in data:
                  print('API Error Response:', json.dumps(data, indent=2))
                  exit(1)

              text = data['candidates'][0]['content']['parts'][0]['text']
              code_match = re.search(r'---CODE---(.*?)---README---', text, re.DOTALL)
              readme_match = re.search(r'---README---(.*)', text, re.DOTALL)

              if code_match and readme_match:
                  folder = 'module_' + ist_time.strftime('%Y%m%d_%H%M')
                  os.makedirs(folder, exist_ok=True)
                  
                  clean_code = code_match.group(1).strip().replace('\\\python', '').replace('\\\', '')
                  
                  with open(f'{folder}/main.py', 'w') as f: 
                      f.write(clean_code)
                  with open(f'{folder}/README.md', 'w') as f: 
                      f.write(readme_match.group(1).strip())
                  print(f'Successfully created {folder} at {ist_time}')
              else:
                  print('Regex markers not found. Output received from AI:', text[:200])
          except Exception as e:
              print(f'Error occurred: {e}')
              exit(1)
          "

      - name: Deploy Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update laboratory modules"
            git push
          fi
