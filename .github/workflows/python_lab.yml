[10-03-2026 18:31] Ganesha💲: name: Educational Portfolio Architect
on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '0 6 * * *'
    - cron: '15 10 * * *'
    - cron: '45 14 * * *'
  workflow_dispatch: 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Project Generator
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha369"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import json, os, requests, re, time, random, subprocess
          from datetime import datetime
          
          # Human-friendly timestamp
          display_date = datetime.now().strftime('%b %d, %Y')
          repo_ts = datetime.now().strftime('%Y%m%d-%H%M')
          
          topics = [
              'Inventory Manager with Hash Maps',
              'Pathfinder Tool using Dijkstra Algorithm',
              'Task Scheduler with Priority Queues',
              'Social Graph Explorer using BFS',
              'Text Search Autocomplete with Tries'
          ]
          selected = random.choice(topics)
          
          # Grounded, human-style prompt
          prompt = f'''Act as a friendly Senior Developer mentor. 
          Help me build a clean Python project for my portfolio about: {selected}.
          Requirements:
          1. Use Streamlit for the UI.
          2. Use clear classes and simple comments.
          3. Explain the DSA part in plain English for beginners.
          Return exactly: [NAME]name[/NAME] [DESC]1-sentence-desc[/DESC] [CODE]python[/CODE] [README]markdown[/README] [REQS]libs[/REQS]'''

          try:
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              resp.raise_for_status()
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']

              name = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-')
              repo_name = f'project-{name}-{repo_ts}'
              desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
              code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              # Create the new project repo
              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              repo_data = {'name': repo_name, 'description': desc, 'private': False}
              requests.post('https://api.github.com/user/repos', json=repo_data, headers=headers).raise_for_status()
              
              clone_url = f'https://{os.getenv(\"GH_TOKEN\")}@github.com/{os.getenv(\"MY_NAME\")}/{repo_name}.git'
              os.makedirs(repo_name, exist_ok=True)
              os.chdir(repo_name)
              subprocess.run(['git', 'init', '-b', 'main'])
              with open('main.py', 'w') as f: f.write(code)
              with open('README.md', 'w') as f: f.write(readme)
              with open('requirements.txt', 'w') as f: f.write(reqs)
              
              subprocess.run(['git', 'config', '--global', 'user.name', os.getenv(\"MY_NAME\")])
              subprocess.run(['git', 'config', '--global', 'user.email', os.getenv(\"MY_EMAIL\")])
[10-03-2026 18:31] Ganesha💲: subprocess.run(['git', 'remote', 'add', 'origin', clone_url])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', 'Initial project build'])
              subprocess.run(['git', 'push', '-u', 'origin', 'main'])
              
              # UPDATE THE SPECIAL BIO REPO
              os.chdir('..')
              profile = os.getenv(\"MY_NAME\")
              subprocess.run(['git', 'clone', f'https://{os.getenv(\"GH_TOKEN\")}@github.com/{profile}/{profile}.git', 'bio'])
              os.chdir('bio')
              
              new_row = f'| {display_date} | [{repo_name}](https://github.com/{profile}/{repo_name}) | {desc} |'
              with open('README.md', 'a') as f: f.write('\n' + new_row)
              
              subprocess.run(['git', 'add', 'README.md'])
              subprocess.run(['git', 'commit', '-m', f'Update gallery: {repo_name}'])
              subprocess.run(['git', 'push'])
              
              print('Done!')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
