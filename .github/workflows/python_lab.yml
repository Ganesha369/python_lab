name: DSA & Backend Architect
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run DSA Generator
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha369"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import requests, os, re, subprocess, random
          from datetime import datetime
          
          display_date = datetime.now().strftime('%b %d, %Y')
          repo_ts = datetime.now().strftime('%Y%m%d-%H%M')
          topics = ['Inventory Manager with Hash Maps', 'Pathfinder Tool using Dijkstra', 'Task Scheduler with Priority Queues', 'Undo/Redo Stack logic']
          selected = random.choice(topics)
          
          prompt = f'Act as a Senior Developer. Build a simple Python project for: {selected}. Use Streamlit. Explain DSA and what beginners usually miss in plain English. Return: [NAME]name[/NAME] [DESC]desc[/DESC] [CODE]code[/CODE] [README]markdown[/README] [REQS]libs[/REQS]'
          
          try:
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              resp.raise_for_status()
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']
              
              name = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-')
              repo_name = f'dsa-{name}-{repo_ts}'
              desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
              code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              # Create Repo
              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': desc}, headers=headers).raise_for_status()
              
              # Push Files
              clone_url = f'https://{os.getenv(\"GH_TOKEN\")}@github.com/Ganesha369/{repo_name}.git'
              os.makedirs(repo_name, exist_ok=True); os.chdir(repo_name)
              subprocess.run(['git', 'init', '-b', 'main'])
              with open('main.py', 'w') as f: f.write(code)
              with open('README.md', 'w') as f: f.write(readme)
              with open('requirements.txt', 'w') as f: f.write(reqs)
              subprocess.run(['git', 'config', '--global', 'user.name', 'Ganesha369'])
              subprocess.run(['git', 'config', '--global', 'user.email', os.getenv(\"MY_EMAIL\")])
              subprocess.run(['git', 'remote', 'add', 'origin', clone_url])
              subprocess.run(['git', 'add', '.']); subprocess.run(['git', 'commit', '-m', 'Build']); subprocess.run(['git', 'push', '-u', 'origin', 'main'])

              # Update Bio Table
              os.chdir('..'); subprocess.run(['git', 'clone', f'https://{os.getenv(\"GH_TOKEN\")}@github.com/Ganesha369/Ganesha369.git', 'bio'])
              os.chdir('bio')
              new_row = f'| {display_date} | [{repo_name}](https://github.com/Ganesha369/{repo_name}) | {desc} |'
              with open('README.md', 'r') as f: content = f.read()
              with open('README.md', 'w') as f: f.write(content.replace('', f'\n{new_row}'))
              subprocess.run(['git', 'add', '.']); subprocess.run(['git', 'commit', '-m', 'Update DSA Gallery']); subprocess.run(['git', 'push'])
          except Exception as e: print(e); exit(1)
          "
