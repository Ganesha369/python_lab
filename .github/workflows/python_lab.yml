on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run DSA Generator
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_NAME: "Ganesha369"
          MY_EMAIL: "ganesha.am.369@gmail.com"
        run: |
          python3 -c "
          import requests, os, re, subprocess, random, time
          from datetime import datetime
          
          display_date = datetime.now().strftime('%b %d, %Y')
          topics = [
              'Log File Error Parser (String Matching)',
              'API Rate Limiter Prototype (Sliding Window)',
              'User Session Cache (LRU Logic)',
              'Inventory Duplicate Remover (Hashing)',
              'Support Ticket Priority (Heaps)',
              'Bank Transaction History (Undo/Stacks)'
          ]
          selected = random.choice(topics)
          
          prompt = f'''Act as a Tech Lead. Build an SDE-1 level Python project for: {selected}.
          1. UI: Streamlit.
          2. Structure: Professional with Classes and Type Hinting.
          3. README: Simple English. Explain the Business Problem, When to use this DSA, and Why it beats a simple list.
          Return: [NAME]slug[/NAME] [DESC]short-desc[/DESC] [CODE]code[/CODE] [README]markdown[/README] [REQS]libs[/REQS]'''
          
          try:
              url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key={os.getenv(\"API_KEY\")}'
              resp = requests.post(url, json={'contents': [{'parts':[{'text': prompt}]}]})
              resp.raise_for_status()
              text = resp.json()['candidates'][0]['content']['parts'][0]['text']
              
              name_slug = re.search(r'\[NAME\](.*?)\[/NAME\]', text, re.DOTALL).group(1).strip().lower().replace(' ', '-')
              repo_name = f'dsa-{name_slug}-{random.randint(10,99)}'
              desc = re.search(r'\[DESC\](.*?)\[/DESC\]', text, re.DOTALL).group(1).strip()
              code = re.search(r'\[CODE\](.*?)\[/CODE\]', text, re.DOTALL).group(1).strip()
              readme = re.search(r'\[README\](.*?)\[/README\]', text, re.DOTALL).group(1).strip()
              reqs = re.search(r'\[REQS\](.*?)\[/REQS\]', text, re.DOTALL).group(1).strip()

              # API - Create Repo
              headers = {'Authorization': f'token {os.getenv(\"GH_TOKEN\")}', 'Accept': 'application/vnd.github.v3+json'}
              requests.post('https://api.github.com/user/repos', json={'name': repo_name, 'description': desc}, headers=headers).raise_for_status()
              
              print(f'Waiting for GitHub to initialize {repo_name}...')
              time.sleep(10) # 10 second safety buffer

              os.makedirs(repo_name, exist_ok=True); os.chdir(repo_name)
              with open('main.py', 'w') as f: f.write(code)
              with open('README.md', 'w') as f: f.write(readme)
              with open('requirements.txt', 'w') as f: f.write(reqs)
              
              subprocess.run(['git', 'init', '-b', 'main'])
              subprocess.run(['git', 'config', 'user.name', 'Ganesha369'])
              subprocess.run(['git', 'config', 'user.email', os.getenv(\"MY_EMAIL\")])
              
              # Auth using token in URL
              remote_url = f'https://x-access-token:{os.getenv(\"GH_TOKEN\")}@github.com/Ganesha369/{repo_name}.git'
              subprocess.run(['git', 'remote', 'add', 'origin', remote_url])
              subprocess.run(['git', 'add', '.'])
              subprocess.run(['git', 'commit', '-m', 'Project Setup'])
              
              # Retry Logic for Push
              for i in range(3):
                  print(f'Push attempt {i+1}...')
                  push = subprocess.run(['git', 'push', '-u', 'origin', 'main'])
                  if push.returncode == 0: break
                  time.sleep(5)
